version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install
        - nvm use
        - node -v
        - npm ci
    build:
      commands:
        - "export NODE_OPTIONS=--max-old-space-size=6144"
        - 'echo ">>> Starting npm run build"'
        - npm run build
        - 'echo ">>> Build finished; verifying Amplify outputs"'
        - 'test -f .next/required-server-files.json || (echo "ERROR missing required-server-files.json under .next" && exit 1)'
        - 'test -d out || (echo "ERROR static out folder missing" && exit 1)'
        - ls -la .next | head -25
  artifacts:
    # Next.js 14+ with output export still emits .next/required-server-files.json; Amplify Hosting expects this path (not out/).
    # See AWS Amplify docs — "Next.js 14 or later SSG application" build settings.
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
