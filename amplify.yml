version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install
        - nvm use
        - node -v
        - npm ci
    build:
      commands:
        - export NODE_OPTIONS="--max-old-space-size=6144"
        - echo ">>> Starting npm run build"
        - npm run build
        - echo ">>> Build script finished; checking out/"
        - test -d out || (echo "ERROR: out/ directory missing — next build did not export static files" && exit 1)
        - ls -la out | head -40
  artifacts:
    baseDirectory: out
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
